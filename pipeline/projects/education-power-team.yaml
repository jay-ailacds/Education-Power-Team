version: "1.0"

project:
  name: "Education Power Team"
  slug: "education-power-team"
  description: "Complete 360-degree solution for educational institutes in India"

output:
  directory: "../../output"
  resolution:
    width: 1920
    height: 1080
  fps: 30
  codec: h264
  audio_bitrate: "192k"
  crf: 18
  max_file_size_mb: 50

voice:
  provider: elevenlabs
  model: "elevenlabs/text-to-speech-multilingual-v2"
  voice_id: "Daniel"
  settings:
    stability: 0.50
    similarity_boost: 0.75
    style: 0.30
    speed: 1.0

music:
  provider: suno
  mode: instrumental
  style: "Corporate upbeat inspirational, modern, warm, motivational"
  title: "Educational Vision"
  version: "V4"
  negative_tags: "Heavy Metal, Harsh, Aggressive, Dark, Sad"

visual:
  source: image-to-video  # Options: image-to-video, ai-generate, local-file, react-capture
  # react_capture:
  #   dev_server_url: "http://localhost:5000"
  #   startup_command: "npm run dev:client"
  #   viewport:
  #     width: 1920
  #     height: 1080
  #   hide_cursor: true
  #   per_segment: true            # Capture each segment individually (14 clips vs 8)
  #   recording_timeout_ms: 120000
  ai_generate:
    provider: veo
    model: veo3_fast
    aspect_ratio: "16:9"

audio_mix:
  voiceover_volume_db: -6
  music_volume_db: -18
  music_duck_db: -24
  fade_in_seconds: 1.0
  fade_out_seconds: 2.0
  gap_between_scenes_seconds: 0.3

slides:
  enabled: true
  style:
    canvas_width: 1920
    canvas_height: 1080
    background_gradient:
      - "#1a1a2e"
      - "#16213e"
      - "#0f3460"
    title_font_size: 64
    stat_font_size: 48
    tagline_font_size: 32
    title_color: "#ffffff"
    stat_color: "#00d4ff"
    tagline_color: "#cccccc"
    accent_line_color: "#00d4ff"
    font_family: "Avenir Next"
    font_path: "/System/Library/Fonts/Avenir Next.ttc"
    min_slide_duration_sec: 1.5
    ken_burns_zoom: 1.08
    duration_offset_sec: -0.3

scenes:
  - id: scene1-hook
    duration_hint_ms: 3000
    script: "Planning to build or upgrade an educational institute?"
    slide_title: "Education Power Team"
    slide_stat: "260 million students across India"
    slide_tagline: "Building the future of education"
    image: "../../assets/campus_ecosystem.png"
    video_prompt: >
      Aerial view of an empty plot of land slowly transforming into a modern
      educational campus. Buildings rise, greenery appears, students walk in.
      Bright daylight, cinematic camera movement.
    transition: fadeBlur

  - id: scene2-vision
    duration_hint_ms: 7000
    script: >
      Every educational institute begins with a vision.
      But building a future-ready institute today requires
      much more than infrastructure.
    slide_title: "The Vision"
    slide_stat: "National Education Policy 2020"
    slide_tagline: "More than bricks and mortar"
    image: "../../assets/smart_classroom_safe.png"
    video_prompt: >
      Blueprint animation transforming into real buildings. Modern classrooms
      appear with digital smartboards and bright interiors. Campus gates open
      to reveal a beautiful walkway lined with trees. Warm natural lighting,
      smooth cinematic camera pan across the institute.
    transition: wipe

  - id: scene3-modern
    duration_hint_ms: 6000
    script: >
      It requires smart classrooms, advanced technology,
      structured sports development, efficient administration,
      and future-ready skills.
    slide_title: "Modern Requirements"
    slide_stat: "4,000+ schools with smart classrooms"
    slide_tagline: "Future-ready skills for today's students"
    image: "../../assets/it_lab_advanced.png"
    video_prompt: >
      Quick montage: smart classroom with digital board, computer lab with
      students coding, sports ground with students playing, admin dashboard
      on screen. Modern Indian educational environment.
    transition: slideUp

  - id: scene4-intro
    duration_hint_ms: 4000
    script: >
      Introducing the Education Power Team — a complete
      360-degree ecosystem for educational institutes.
    slide_title: "Education Power Team"
    slide_stat: "Complete 360-degree ecosystem"
    slide_tagline: "From infrastructure to innovation"
    image: "../../assets/campus_ecosystem.png"
    video_prompt: >
      Multiple service icons connecting into a single ecosystem diagram,
      pulsing with energy. Central hub labeled 'Education Power Team' with
      connecting lines radiating outward. Modern infographic animation.
    transition: zoomThrough

  - id: scene5-infrastructure
    duration_hint_ms: 18000
    transition: slideLeft
    segments:
      - id: scene5a-vardhman
        script: "Vardhaman Traders builds modern classroom and laboratory infrastructure."
        duration_hint_ms: 4500
        slide_title: "Vardhaman Traders"
        slide_stat: "95% agree facilities boost performance"
        slide_tagline: "Classroom & laboratory infrastructure"
        image: "../../assets/vardhman_classroom.png"
        video_prompt: >
          Modern classroom being constructed, desks being arranged,
          laboratory equipment being installed. Clean, professional
          Indian school environment.

      - id: scene5b-megabyte
        script: "Mega Byte Systems delivers advanced IT systems, networking, and digital labs."
        duration_hint_ms: 4500
        slide_title: "Mega Byte Systems"
        slide_stat: "Powering digital classrooms"
        slide_tagline: "IT systems, networking & digital labs"
        image: "../../assets/computerlabs_1773047158875.jpg"
        video_prompt: >
          Modern computer lab with rows of monitors glowing, networking cables
          being connected to server racks, digital smartboard displaying code.
          Clean, professional IT infrastructure environment.

      - id: scene5c-acepower
        script: "Ace Power ensures reliable power backup for uninterrupted operations."
        duration_hint_ms: 4500
        slide_title: "Ace Power"
        slide_stat: "24/7 power backup"
        slide_tagline: "Learning never stops"
        image: "../../assets/Batteris_1773047158874.webp"
        video_prompt: >
          Industrial generators and battery backup systems powering a school
          campus. Lights staying on during power switch. Reliable infrastructure.

      - id: scene5d-athletos
        script: "Athletos Sports Foundation develops structured sports infrastructure and training."
        duration_hint_ms: 4500
        slide_title: "Athletos Sports Foundation"
        slide_stat: "Grassroots to national level"
        slide_tagline: "Grassroots to national-level excellence"
        image: "../../assets/sports_academy_1773047158873.jpeg"
        video_prompt: >
          Students playing on a modern sports field, running track, cricket
          ground, basketball court. Indian students in sports uniforms,
          coach training them.

  - id: scene6-operations
    duration_hint_ms: 14000
    transition: scaleFade
    segments:
      - id: scene6a-aksolutions
        script: "A.K. Solutions streamlines administration with ERP and automation."
        duration_hint_ms: 3500
        slide_title: "A.K. Solutions"
        slide_stat: "Near-perfect accuracy"
        slide_tagline: "ERP & administration automation"
        image: "../../assets/tally_1773047158873.jpg"
        video_prompt: >
          ERP dashboard on a computer screen, school administrator managing
          data, automated reports generating. Clean office environment.

      - id: scene6b-rootsquare
        script: "Root Square LLP manages uniforms and stationery supply systems."
        duration_hint_ms: 3500
        slide_title: "Root Square LLP"
        slide_stat: "Equipped from day one"
        slide_tagline: "Uniforms & stationery supply"
        image: "../../assets/root_square_supplies.png"
        video_prompt: >
          Neatly arranged uniforms on display racks, organized stationery
          warehouse with labeled shelves, supply chain logistics with boxes
          being sorted. Bright, clean distribution center environment.

      - id: scene6c-ailacds
        script: "Aila-cee-dee-ess empowers institutes with AI skills programs, AI summer camps, and AI-enabled learning platforms."
        duration_hint_ms: 3500
        slide_title: "Aila CDS"
        slide_stat: "AI fluency is essential"
        slide_tagline: "AI skills programs & learning platforms"
        image: "../../assets/ai_learning_platform.png"
        video_prompt: >
          Laptop screens showing AI interfaces and neural network visualizations,
          lines of code scrolling on monitors, a large display showing a modern
          AI-powered learning platform dashboard. Futuristic tech environment
          with blue ambient lighting.

      - id: scene6d-asperia
        script: "Asperia Institute provides skill-based training programs for medical students across PAN India."
        duration_hint_ms: 3500
        slide_title: "Asperia Institute"
        slide_stat: "PAN India reach"
        slide_tagline: "Skill-based medical training"
        image: "../../assets/skillbasedmedical_1773047158871.webp"
        video_prompt: >
          Medical training classroom, students in lab coats practicing,
          anatomical models, skill-based hands-on training sessions.
          Professional medical education environment.

  - id: scene7-foresight
    duration_hint_ms: 4000
    script: "Global Foresight guides students with career counseling and higher education planning."
    slide_title: "Global Foresight"
    slide_stat: "Universities & careers worldwide"
    slide_tagline: "Career counseling & higher education"
    image: "../../assets/global_foresight_counseling.png"
    video_prompt: >
      Indian students discussing career plans with a mentor at a desk,
      globe spinning in background, university brochures on table.
      Warm, encouraging atmosphere.
    transition: fadeBlur

  - id: scene8-final
    duration_hint_ms: 4000
    script: "One powerful ecosystem for building the future of education."
    slide_title: "Education Power Team"
    slide_stat: "Eight specialized partners"
    slide_tagline: "Building the future of education"
    image: "../../assets/campus_ecosystem.png"
    video_prompt: >
      All service icons connecting around a modern campus aerial view.
      Text appears: 'Education Power Team'. Golden light, inspiring
      cinematic finale. Campus full of happy students.
    transition: morphExpand
